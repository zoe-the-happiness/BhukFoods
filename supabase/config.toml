# For details see https://supabase.com/docs/guides/cli/config
project_id = "atbjnresahzomvmqrlef"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "5MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://www.bhukfoods.com", "https://bhukfoods.com"]
jwt_expiry = 3600
enable_signup = false
# Magic links only; password sign-in disabled.

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = true

[auth.email.template.magic_link]
subject = "Your Bhuk Foods login link"
content_path = "./templates/magic_link.html"

[edge_runtime]
enabled = false
